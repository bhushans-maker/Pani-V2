name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find and move to project root
        run: |
          PKG=$(find . -name "package.json" -not -path "*/node_modules/*" | head -1)
          DIR=$(dirname "$PKG")
          echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          echo "Found project at: $DIR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies & build web
        run: |
          cd $PROJECT_DIR
          npm install
          npm run build
          npx cap sync android

      - name: Install Gradle 8.14.3 and regenerate wrapper
        run: |
          cd $PROJECT_DIR/android
          curl -fsSL https://services.gradle.org/distributions/gradle-8.14.3-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.14.3/bin/gradle wrapper --gradle-version 8.14.3
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd $PROJECT_DIR/android
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aquaalarm-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
